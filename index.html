<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myMemoryRun</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Modern, friendly palette */
            --primary-color: #ff9a3c; /* Soft energetic orange */
            --primary-hover: #ff8514;
            --secondary-color: #6c5ce7; /* Calming purple/blue */
            --bg-color: #fff9f0; /* Warm cream background */
            --surface-color: #ffffff;
            --text-color: #2d3436;
            --border-radius: 24px;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            transition: background-color 0.3s, color 0.3s;
        }

        h1 { margin-bottom: 2rem; font-weight: 800; color: var(--primary-color); letter-spacing: -0.5px; }

        .container {
            background: var(--surface-color);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05); /* Soft, diffuse shadow */
            border: 1px solid rgba(0,0,0,0.02);
            width: 100%;
            max-width: 600px;
            text-align: center;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .hidden { display: none !important; }

        /* Form Elements */
        .form-group { margin-bottom: 1.5rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        select, input, textarea {
            width: 100%;
            padding: 1rem;
            background-color: var(--bg-color);
            border: 2px solid transparent;
            border-radius: 16px; /* Softer inputs */
            font-size: 1rem;
            font-family: 'Nunito', sans-serif;
            box-sizing: border-box;
            transition: all 0.2s;
            color: var(--text-color);
        }
        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: var(--surface-color);
        }
        
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 1rem 1.5rem;
            border-radius: 50px; /* Pill shape */
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            width: 100%;
            box-shadow: 0 4px 12px rgba(255, 154, 60, 0.3);
        }
        .btn:hover { background-color: var(--primary-hover); transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        
        .btn-danger { background-color: #ff7675; box-shadow: 0 4px 12px rgba(255, 118, 117, 0.3); }
        .btn-danger:hover { background-color: #d63031; }
        
        .btn-secondary { 
            background-color: transparent; 
            color: var(--text-color); 
            border: 2px solid #dfe6e9; 
            margin-top: 10px;
            box-shadow: none;
        }
        .btn-secondary:hover { background-color: #dfe6e9; color: #2d3436; }

        /* Display Phase */
        #display-area { 
            font-family: 'Orbitron', sans-serif; 
            font-size: 4.5rem; 
            font-weight: bold; 
            margin: 3rem 0; 
            min-height: 120px; 
            letter-spacing: 0.05em;
            color: var(--secondary-color);
            text-shadow: 0 4px 10px rgba(108, 92, 231, 0.2); 
        }
        
        /* Animation for new items */
        .pop-in { animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Results Table */
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { border-bottom: 1px solid rgba(0,0,0,0.05); padding: 1rem; text-align: left; }
        th { background-color: transparent; color: var(--secondary-color); font-weight: 800; border-bottom: 2px solid rgba(0,0,0,0.05); }
        tr:last-child td { border-bottom: none; }
        
        .correct { background-color: #dcfce7; color: #166534; }
        .incorrect { background-color: #fee2e2; color: #991b1b; }
        
        /* Rounded badges for table results */
        td.correct, td.incorrect { border-radius: 8px; font-weight: bold; text-align: center;}

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        #splash-screen.fade-out {
            opacity: 0;
            visibility: hidden;
        }
        #splash-screen img { width: 120px; height: 120px; margin-bottom: 20px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Modern Dark Mode (Deep Blue-Grey, not Black) */
        body.dark-mode {
            --bg-color: #1e272e;
            --surface-color: #2d3436;
            --text-color: #dfe6e9;
            --primary-color: #fab1a0; /* Pastel Peach */
            --primary-hover: #e17055;
            --secondary-color: #a29bfe; /* Pastel Purple */
        }
        body.dark-mode .container {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.05);
        }
        body.dark-mode input, body.dark-mode select, body.dark-mode textarea {
            background-color: #1e272e;
            color: var(--text-color);
        }
        body.dark-mode select:focus, body.dark-mode input:focus, body.dark-mode textarea:focus {
             border-color: var(--primary-color);
             background-color: #1e272e;
        }
        body.dark-mode .btn {
            background-color: var(--primary-color);
            color: #2d3436; /* Dark text on light buttons */
            box-shadow: 0 4px 12px rgba(250, 177, 160, 0.2);
        }
        body.dark-mode .btn:hover {
            background-color: var(--primary-hover);
        }
        body.dark-mode th {
            color: var(--secondary-color);
        }
        body.dark-mode td {
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        body.dark-mode .btn-secondary {
            border-color: #636e72;
            color: #dfe6e9;
        }
        body.dark-mode .btn-secondary:hover {
            background-color: #636e72;
        }
        body.dark-mode .correct { background-color: #00b894; color: #000; }
        body.dark-mode .incorrect { background-color: #d63031; color: #fff; }
        body.dark-mode #display-area { text-shadow: 0 4px 15px rgba(162, 155, 254, 0.3); }
        
        footer {
            margin-top: auto;
            padding-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            opacity: 0.7;
        }

    </style>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- SPLASH SCREEN -->
    <div id="splash-screen">
        <img src="icon-192.png" alt="myMemoryRun Logo">
        <h2>Loading...</h2>
    </div>

    <h1>🧠 myMemoryRun</h1>

    <!-- SETUP SCREEN -->
    <div id="setup-screen" class="container">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: flex-end;">
             <button id="theme-btn" class="btn btn-secondary" onclick="toggleTheme()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.9rem; margin-top:0;">🌙 Mode</button>
             <button id="install-btn" class="btn hidden" onclick="installApp()" style="width: auto; padding: 0.5rem 1rem; font-size: 0.9rem; margin-top:0; background-color: var(--secondary-color);">⬇ Install</button>
        </div>
        <div class="form-group">
            <label for="mode">Mode</label>
            <select id="mode" onchange="updateUI()">
                <option value="words">Words</option>
                <option value="numbers">Numbers</option>
                <option value="custom">Custom Words</option>
            </select>
        </div>

        <div class="form-group">
            <label for="voice-select">Voice</label>
            <select id="voice-select"></select>
        </div>

        <div class="form-group">
            <label for="recall-mode">Recall Method</label>
            <select id="recall-mode">
                <option value="text">Type Answers</option>
                <option value="choice">Multiple Choice</option>
            </select>
        </div>

        <div class="form-group hidden" id="digits-group">
            <label for="digits">Number of Digits</label>
            <input type="number" id="digits" value="2" min="1" max="12">
        </div>

        <div class="form-group hidden" id="custom-words-group">
            <label for="custom-words">Custom Words (Space/Comma separated)</label>
            <textarea id="custom-words" rows="3" placeholder="Anatomy Physics Chemistry..."></textarea>
        </div>

        <div class="form-group">
            <label for="quantity">Quantity <span style="font-weight:normal; font-size: 0.9em; margin-left: 10px;"><input type="checkbox" id="continuous" onchange="updateUI()"> Continuous Mode (Until Stopped)</span></label>
            <input type="number" id="quantity" value="5" min="1" max="50">
        </div>

        <div class="form-group">
            <label>Interval</label>
            <div style="display: flex; gap: 10px;">
                <input type="number" id="interval-val" value="2" min="1">
                <select id="interval-unit">
                    <option value="1000">Seconds</option>
                    <option value="60000">Minutes</option>
                </select>
            </div>
        </div>

        <button class="btn" onclick="startSession()">Start Memory Session</button>
        <button class="btn btn-secondary" onclick="showProgress()">View Progress</button>
    </div>

    <!-- DISPLAY SCREEN -->
    <div id="display-screen" class="container hidden">
        <p>Memorize this sequence...</p>
        <div id="display-area"></div>
        <button class="btn btn-danger" onclick="stopSession()">Stop / I'm Ready</button>
    </div>

    <!-- RECALL SCREEN -->
    <div id="recall-screen" class="container hidden">
        <h2>Recall Phase</h2>
        <p id="recall-instructions">Enter the items you remember in order, separated by spaces, commas, or new lines.</p>
        <textarea id="recall-input" rows="6" placeholder="Item1 Item2 Item3..."></textarea>
        <div id="mc-container" class="hidden" style="text-align: left; max-height: 400px; overflow-y: auto;"></div>
        <button class="btn" onclick="checkResults()">Submit Answers</button>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results-screen" class="container hidden">
        <h2>Results</h2>
        <div id="score-summary"></div>
        <div id="results-table-container"></div>
        <button class="btn btn-secondary" onclick="location.reload()">Try Again</button>
    </div>

    <!-- PROGRESS SCREEN -->
    <div id="progress-screen" class="container hidden">
        <h2>Progress History</h2>
        <div style="position: relative; height: 300px; width: 100%; margin-bottom: 20px;">
            <canvas id="progressChart"></canvas>
        </div>
        <div id="history-container" style="max-height: 400px; overflow-y: auto;"></div>
        <button class="btn btn-secondary" onclick="backToSetup()">Back to Menu</button>
        <button class="btn btn-danger" style="margin-top: 10px" onclick="clearHistory()">Clear History</button>
    </div>

    <footer>
        <p>&copy; <span id="copyright-year"></span> myMemoryRun. All rights reserved.</p>
    </footer>

    <script>
        // --- Configuration & State ---
        const WORD_BANK = [
            "Apple", "River", "House", "Planet", "Train", "Music", "Tiger", "Window", 
            "Cloud", "Guitar", "Bread", "Clock", "Flower", "Pencil", "Shoes", "Ocean", 
            "Chair", "Rocket", "Snake", "Bottle", "Lemon", "Bridge", "Ghost", "Robot", 
            "Camera", "Spider", "Banana", "Ticket", "Jacket", "Wallet", "Market", "Doctor",
            "Summer", "Winter", "Forest", "Desert", "Castle", "Island", "Hammer", "Basket"
        ];

        let session = {
            mode: 'words',
            items: [],
            interval: 2000,
            digits: 2,
            continuous: false,
            currentIndex: 0,
            timerId: null,
            speechTimerId: null, // Timer for between-digit pauses
            chartInstance: null,
            voices: [],
            customBank: [],
            deferredPrompt: null,
            recallMode: 'text'
        };

        // --- Core Functions ---
        
        function updateUI() {
            const mode = document.getElementById('mode').value;
            const isContinuous = document.getElementById('continuous').checked;
            
            // Toggle Digits Input
            const digitsGroup = document.getElementById('digits-group');
            if (mode === 'numbers') {
                digitsGroup.classList.remove('hidden');
            } else {
                digitsGroup.classList.add('hidden');
            }

            // Toggle Custom Words Input
            const customGroup = document.getElementById('custom-words-group');
            if (mode === 'custom') {
                customGroup.classList.remove('hidden');
            } else {
                customGroup.classList.add('hidden');
            }

            // Toggle Quantity Input
            document.getElementById('quantity').disabled = isContinuous;
        }

        function generateItem(mode, digits) {
            if (mode === 'words') {
                return WORD_BANK[Math.floor(Math.random() * WORD_BANK.length)];
            } else if (mode === 'custom') {
                if (!session.customBank || session.customBank.length === 0) return "Error";
                return session.customBank[Math.floor(Math.random() * session.customBank.length)];
            } else {
                // Number Logic
                if (digits <= 1) return Math.floor(Math.random() * 10).toString();
                
                // Calculate range for n digits (e.g., 2 digits: 10-99)
                const min = Math.pow(10, digits - 1);
                const max = Math.pow(10, digits) - 1;
                return Math.floor(min + Math.random() * (max - min + 1)).toString();
            }
        }

        function startSession() {
            // Save preferences to LocalStorage
            const settings = {
                mode: document.getElementById('mode').value,
                digits: document.getElementById('digits').value,
                continuous: document.getElementById('continuous').checked,
                quantity: document.getElementById('quantity').value,
                intervalVal: document.getElementById('interval-val').value,
                customWords: document.getElementById('custom-words').value,
                voiceIndex: document.getElementById('voice-select').value,
                recallMode: document.getElementById('recall-mode').value
            };
            localStorage.setItem('memoryTrainerSettings', JSON.stringify(settings));

            // 1. Get Settings
            session.mode = document.getElementById('mode').value;
            session.recallMode = document.getElementById('recall-mode').value;
            session.digits = parseInt(document.getElementById('digits').value) || 2;
            session.continuous = document.getElementById('continuous').checked;
            
            const qty = parseInt(document.getElementById('quantity').value) || 5;
            const intervalVal = parseInt(document.getElementById('interval-val').value) || 2;
            const intervalUnit = parseInt(document.getElementById('interval-unit').value) || 1000;
            session.interval = intervalVal * intervalUnit;

            // Setup Custom Bank if needed
            if (session.mode === 'custom') {
                const raw = document.getElementById('custom-words').value;
                session.customBank = raw.split(/[\s,]+/).filter(s => s.length > 0);
                if (session.customBank.length === 0) {
                    alert("Please enter some custom words!");
                    return;
                }
            }

            // 2. Generate Items
            session.items = [];
            
            // If NOT continuous, pre-generate the list
            if (!session.continuous) {
                for (let i = 0; i < qty; i++) {
                    session.items.push(generateItem(session.mode, session.digits));
                }
            }

            // 3. Switch UI
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('display-screen').classList.remove('hidden');

            // 4. Start Loop
            session.currentIndex = 0;
            showNextItem();
        }

        function showNextItem() {
            const displayArea = document.getElementById('display-area');
            
            // Logic for retrieving or generating the item
            let item;

            if (session.continuous) {
                // Generate on the fly
                item = generateItem(session.mode, session.digits);
                session.items.push(item);
            } else {
                // Check if finished (Fixed Quantity Mode)
                if (session.currentIndex >= session.items.length) {
                    stopSession();
                    return;
                }
                item = session.items[session.currentIndex];
            }

            
            // Display
            displayArea.textContent = item;
            
            // Remove class to reset animation, then add it back next frame
            displayArea.classList.remove('pop-in');
            void displayArea.offsetWidth; // Trigger reflow
            displayArea.classList.add('pop-in');

            // Define what happens after the item is spoken
            const onSpeechEnd = () => {
                // Schedule the next item to appear
                session.timerId = setTimeout(() => {
                    session.currentIndex++;
                    showNextItem();
                }, session.interval);
            };

            // Text-to-Speech, with a callback for when it completes
            speak(item, onSpeechEnd);
        }

        function speak(text, onComplete) {
            const callback = onComplete || (() => {});

            if (!('speechSynthesis' in window) || !text) {
                callback(); // Immediately callback if speech is not supported or text is empty
                return;
            }

            // Cancel any speech that might be lingering from a previous, fast-timed item
            window.speechSynthesis.cancel();

            // For numbers with multiple digits, speak them with a 1s delay
            if (session.mode === 'numbers' && text.length > 1) {
                const digits = text.split('');
                speakWithPauses(digits, 0, callback);
            } else {
                // For words or single digits, speak normally
                const msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1; // Normal speed
                msg.pitch = 1;
                msg.onend = callback;
                applyVoice(msg);
                window.speechSynthesis.speak(msg);
            }
        }

        function speakWithPauses(parts, index, onComplete) {
            // Base case: If all parts have been spoken, call the final callback
            if (index >= parts.length) {
                onComplete();
                return;
            }

            const part = parts[index];
            const msg = new SpeechSynthesisUtterance(part);
            msg.rate = 1;
            msg.pitch = 1;

            // When the current digit is done speaking...
            msg.onend = () => {
                speakWithPauses(parts, index + 1, onComplete);
            };

            applyVoice(msg);
            window.speechSynthesis.speak(msg);
        }

        function applyVoice(msg) {
            const voiceSelect = document.getElementById('voice-select');
            if (session.voices.length > 0 && session.voices[voiceSelect.value]) {
                msg.voice = session.voices[voiceSelect.value];
            }
        }

        function stopSession() {
            clearTimeout(session.timerId);
            clearTimeout(session.speechTimerId); // Stop any pending digit speech
            if ('speechSynthesis' in window) window.speechSynthesis.cancel(); // Stop current speech

            // Move to Recall
            document.getElementById('display-screen').classList.add('hidden');
            document.getElementById('recall-screen').classList.remove('hidden');
            
            if (session.recallMode === 'choice') {
                document.getElementById('recall-input').classList.add('hidden');
                document.getElementById('mc-container').classList.remove('hidden');
                document.getElementById('recall-instructions').textContent = "Select the correct item for each position.";
                renderMultipleChoice();
            } else {
                document.getElementById('recall-input').classList.remove('hidden');
                document.getElementById('mc-container').classList.add('hidden');
                document.getElementById('recall-instructions').textContent = "Enter the items you remember in order...";
                document.getElementById('recall-input').value = ''; 
                document.getElementById('recall-input').focus();
            }
        }

        function renderMultipleChoice() {
            const container = document.getElementById('mc-container');
            container.innerHTML = '';
            
            session.items.forEach((item, index) => {
                // 1. Prepare options (Target + 3 Distractors)
                let options = [item];
                let pool = (session.mode === 'words') ? WORD_BANK : (session.mode === 'custom' ? session.customBank : []);
                
                for (let i = 0; i < 3; i++) {
                    let distractor;
                    let attempts = 0;
                    // Find a unique distractor
                    do {
                        if (session.mode === 'numbers') {
                            distractor = generateItem('numbers', session.digits);
                        } else {
                            distractor = pool[Math.floor(Math.random() * pool.length)];
                        }
                        attempts++;
                    } while ((options.includes(distractor) || distractor === item) && attempts < 20);
                    options.push(distractor);
                }
                
                // 2. Shuffle
                options.sort(() => Math.random() - 0.5);
                
                // 3. Render Dropdown
                const div = document.createElement('div');
                div.className = 'form-group';
                div.innerHTML = `<label style="font-size: 0.9em; color: var(--secondary-color);">Item #${index + 1}</label>`;
                
                const select = document.createElement('select');
                select.className = 'mc-select';
                
                // Default empty option
                select.innerHTML = '<option value="">-- Select --</option>';
                
                options.forEach(opt => {
                    select.innerHTML += `<option value="${opt}">${opt}</option>`;
                });
                
                div.appendChild(select);
                container.appendChild(div);
            });
        }

        function checkResults() {
            let userItems = [];

            if (session.recallMode === 'choice') {
                const selects = document.querySelectorAll('.mc-select');
                selects.forEach(sel => userItems.push(sel.value));
            } else {
                const inputRaw = document.getElementById('recall-input').value;
                // Split by space, comma, or newline and filter empty strings
                userItems = inputRaw.split(/[\s,]+/).filter(s => s.length > 0);
            }
            
            let correctCount = 0;
            let html = `<table>
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Target</th>
                                <th>Your Answer</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>`;

            // Compare items
            const maxLen = Math.max(session.items.length, userItems.length);
            
            for (let i = 0; i < maxLen; i++) {
                const target = session.items[i] || "-";
                const answer = userItems[i] || "-";
                
                // Case-insensitive comparison
                const isCorrect = target.toLowerCase() === answer.toLowerCase();
                if (isCorrect) correctCount++;

                html += `<tr>
                            <td>${i + 1}</td>
                            <td>${target}</td>
                            <td class="${isCorrect ? 'correct' : 'incorrect'}">${answer}</td>
                            <td>${isCorrect ? '✅' : '❌'}</td>
                         </tr>`;
            }

            html += `</tbody></table>`;

            // Update Summary
            document.getElementById('score-summary').innerHTML = `<h3>You scored ${correctCount} / ${session.items.length}</h3>`;
            document.getElementById('results-table-container').innerHTML = html;

            // Save to History
            saveSessionHistory(session.mode, correctCount, session.items.length);

            // Switch UI
            document.getElementById('recall-screen').classList.add('hidden');
            document.getElementById('results-screen').classList.remove('hidden');
        }

        function loadPreferences() {
            const saved = localStorage.getItem('memoryTrainerSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                if (settings.mode) document.getElementById('mode').value = settings.mode;
                if (settings.digits) document.getElementById('digits').value = settings.digits;
                if (settings.continuous !== undefined) document.getElementById('continuous').checked = settings.continuous;
                if (settings.quantity) document.getElementById('quantity').value = settings.quantity;
                if (settings.intervalVal) document.getElementById('interval-val').value = settings.intervalVal;
                if (settings.customWords) document.getElementById('custom-words').value = settings.customWords;
                if (settings.recallMode) document.getElementById('recall-mode').value = settings.recallMode;
                // Voice is handled in populateVoices due to async loading
            }
        }

        // --- History / Progress Functions ---

        function saveSessionHistory(mode, score, total) {
            const history = JSON.parse(localStorage.getItem('memoryTrainerHistory') || '[]');
            const entry = {
                date: new Date().toLocaleString(),
                mode: mode,
                score: score,
                total: total
            };
            history.unshift(entry); // Add to beginning
            // Keep last 50 entries
            if (history.length > 50) history.pop();
            localStorage.setItem('memoryTrainerHistory', JSON.stringify(history));
        }

        function showProgress() {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('progress-screen').classList.remove('hidden');
            
            const history = JSON.parse(localStorage.getItem('memoryTrainerHistory') || '[]');
            const container = document.getElementById('history-container');
            
            if (history.length === 0) {
                if (session.chartInstance) session.chartInstance.destroy();
                container.innerHTML = '<p>No history yet. Complete a session to see results here!</p>';
                return;
            }

            renderChart(history);

            let html = `<table><thead><tr><th>Date</th><th>Mode</th><th>Score</th><th>%</th></tr></thead><tbody>`;
            
            history.forEach(h => {
                const pct = h.total > 0 ? Math.round((h.score / h.total) * 100) : 0;
                html += `<tr><td>${h.date}</td><td style="text-transform: capitalize">${h.mode}</td><td>${h.score}/${h.total}</td><td>${pct}%</td></tr>`;
            });
            
            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function renderChart(history) {
            const ctx = document.getElementById('progressChart').getContext('2d');
            
            // Destroy previous chart if exists to prevents "flickering" or overlapping
            if (session.chartInstance) {
                session.chartInstance.destroy();
            }

            // Prepare data (reverse so oldest is left, newest is right)
            const reversedHistory = [...history].reverse();
            const labels = reversedHistory.map((h, index) => `Session ${index + 1}`);
            const dataPoints = reversedHistory.map(h => (h.total > 0 ? (h.score / h.total) * 100 : 0));

            // Check theme for colors
            const isDark = document.body.classList.contains('dark-mode');
            const lineColor = isDark ? '#a29bfe' : '#6c5ce7';
            const fillColor = isDark ? 'rgba(162, 155, 254, 0.1)' : 'rgba(108, 92, 231, 0.1)';

            session.chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Accuracy (%)',
                        data: dataPoints,
                        borderColor: lineColor,
                        backgroundColor: fillColor,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4 // Smooth curves
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: true, 
                            max: 100,
                            grid: { color: isDark ? '#636e72' : '#e2e8f0' }
                        },
                        x: {
                            grid: { color: isDark ? '#636e72' : '#e2e8f0' }
                        }
                    }
                }
            });
        }

        function backToSetup() {
            document.getElementById('progress-screen').classList.add('hidden');
            document.getElementById('setup-screen').classList.remove('hidden');
        }

        function clearHistory() {
            if (confirm("Clear all history?")) {
                localStorage.removeItem('memoryTrainerHistory');
                showProgress();
            }
        }

        // --- Keyboard Shortcuts ---

        function handleGlobalKeys(e) {
            // Ignore if focus is on inputs (except for specific combos)
            const tag = e.target.tagName.toLowerCase();
            const isInput = tag === 'input' || tag === 'select' || tag === 'textarea';

            // 1. Setup Phase: Enter to Start
            if (!document.getElementById('setup-screen').classList.contains('hidden')) {
                if (e.key === 'Enter') startSession();
            }

            // 2. Display Phase: Space or Enter to Stop
            else if (!document.getElementById('display-screen').classList.contains('hidden')) {
                if (e.key === ' ' || e.key === 'Enter') {
                    e.preventDefault(); // Prevent scrolling with space
                    stopSession();
                }
            }

            // 3. Recall Phase: Ctrl+Enter to Submit
            else if (!document.getElementById('recall-screen').classList.contains('hidden')) {
                if (e.key === 'Enter' && e.ctrlKey) checkResults();
            }

            // 4. Results Phase: Enter or Space to Reload/Try Again
            else if (!document.getElementById('results-screen').classList.contains('hidden')) {
                if (e.key === 'Enter' || e.key === ' ') location.reload();
            }
        }

        // --- Voice Loading ---
        
        function populateVoices() {
            session.voices = window.speechSynthesis.getVoices();
            const voiceSelect = document.getElementById('voice-select');
            
            // Clear existing
            voiceSelect.innerHTML = '';
            
            session.voices.forEach((voice, i) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = i;
                voiceSelect.appendChild(option);
            });

            // Restore preference if exists
            const saved = localStorage.getItem('memoryTrainerSettings');
            if (saved) {
                const settings = JSON.parse(saved);
                if (settings.voiceIndex !== undefined && session.voices[settings.voiceIndex]) {
                    voiceSelect.value = settings.voiceIndex;
                }
            }
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('memoryTrainerTheme', isDark ? 'dark' : 'light');
            
            // Update button text
            const btn = document.getElementById('theme-btn');
            if(btn) btn.innerText = isDark ? "☀️ Light" : "🌙 Dark";
        }

        // Load theme preference immediately
        if (localStorage.getItem('memoryTrainerTheme') === 'dark') {
            document.body.classList.add('dark-mode');
        }

        // Initialize UI state on load
        loadPreferences();
        updateUI();
        
        // Setup voices (browsers load them asynchronously)
        populateVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoices;
        }

        // Initialize button text based on loaded theme
        if(document.body.classList.contains('dark-mode')) {
            const btn = document.getElementById('theme-btn');
            if(btn) btn.innerText = "☀️ Light";
        }

        document.addEventListener('keydown', handleGlobalKeys);

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed:', err));
            });
        }

        // --- Splash Screen Logic ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('fade-out');
            }, 3000); // 3 second delay
        });

        // --- PWA Installation Logic ---
        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            // Stash the event so it can be triggered later.
            session.deferredPrompt = e;
            // Update UI to notify the user they can add to home screen
            const installBtn = document.getElementById('install-btn');
            if (installBtn) installBtn.classList.remove('hidden');
        });

        function installApp() {
            if (session.deferredPrompt) {
                session.deferredPrompt.prompt();
                session.deferredPrompt.userChoice.then((choiceResult) => {
                    session.deferredPrompt = null;
                    document.getElementById('install-btn').classList.add('hidden');
                });
            }
        }
        
        // Set Copyright Year
        document.getElementById('copyright-year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
